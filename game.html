<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>поймай воспоминания</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Счетчик -->
        <div class="score" id="gameScore">
            <span class="score-label">поймано:</span>
            <span class="score-number" id="scoreNumber">0</span>
            <span class="score-total">/6</span>
        </div>
        
        <!-- Корзинка -->
        <div class="catcher" id="catcher">
            <div class="catcher-glow"></div>
        </div>
        
        <!-- Эффект вспышки при ловле -->
        <div class="catch-flash" id="catchFlash"></div>
        
        <!-- Экран победы -->
        <div class="win-screen" id="winScreen">
            <h2>все воспоминания пойманы</h2>
            <div class="win-buttons">
                <button class="btn" onclick="location.href='polaroid.html'">в альбом</button>
                <button class="btn btn-outline" onclick="resetGame()">ещё раз</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
